<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Réponses reçues</title>
<style>
  :root{
    --cream: #FBF3EE;
    --terracotta-deep: #D97456;
    --ink: #4A3F3D;
    --ink-soft: #8A7B77;
    --paper-edge: #EAD9CC;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--cream);
    font-family:-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    color:var(--ink);
    padding:32px 16px;
  }
  .wrap{ max-width:560px; margin:0 auto; }
  h1{ font-family:Georgia, serif; font-size:24px; margin-bottom:6px; }
  .sub{ color:var(--ink-soft); font-size:14px; margin-bottom:24px; }

  .gate{
    background:#fff;
    border-radius:14px;
    padding:24px;
    border:1px solid var(--paper-edge);
  }
  input{
    width:100%;
    padding:12px 14px;
    border-radius:10px;
    border:1.5px solid var(--paper-edge);
    font-size:15px;
    margin-bottom:12px;
  }
  button{
    background:var(--terracotta-deep);
    color:#fff;
    border:none;
    border-radius:10px;
    padding:12px 20px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
  }

  .entry{
    background:#fff;
    border-radius:14px;
    padding:20px;
    margin-bottom:16px;
    border:1px solid var(--paper-edge);
  }
  .entry-date{
    font-size:11.5px;
    color:var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:0.05em;
    margin-bottom:12px;
  }
  .qa{ padding:8px 0; border-bottom:1px dashed var(--paper-edge); }
  .qa:last-child{ border-bottom:none; }
  .qa-label{ font-size:11px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.04em; }
  .qa-answer{ font-size:15px; font-weight:600; margin-top:2px; }
  .empty{ color:var(--ink-soft); font-size:14px; padding:20px; text-align:center; }
  .error{ color:#b04a3a; font-size:14px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Réponses reçues</h1>
  <div class="sub">Ce que ta copine a répondu au petit carnet.</div>

  <div id="gate" class="gate">
    <input type="password" id="pwd" placeholder="Mot de passe">
    <button id="unlockBtn">Voir les réponses</button>
    <div class="error" id="err"></div>
  </div>

  <div id="results"></div>
</div>

<script>
document.getElementById('unlockBtn').onclick = async () => {
  const pwd = document.getElementById('pwd').value;
  const err = document.getElementById('err');
  err.textContent = '';
  try{
    const r = await fetch('/api/responses?password=' + encodeURIComponent(pwd));
    if(r.status === 401){
      err.textContent = 'Mot de passe incorrect.';
      return;
    }
    const data = await r.json();
    document.getElementById('gate').style.display = 'none';
    renderResults(data.responses || []);
  }catch(e){
    err.textContent = 'Erreur de chargement, réessaie.';
  }
};

function renderResults(list){
  const container = document.getElementById('results');
  if(list.length === 0){
    container.innerHTML = '<div class="empty">Aucune réponse pour le moment.</div>';
    return;
  }
  container.innerHTML = list.map(entry => {
    const date = entry.submittedAt ? new Date(entry.submittedAt).toLocaleString('fr-FR') : '';
    const qas = (entry.answers || []).map(a => `
      <div class="qa">
        <div class="qa-label">${a.eyebrow || ''}</div>
        <div class="qa-answer">${a.answer || '—'}</div>
      </div>
    `).join('');
    return `<div class="entry"><div class="entry-date">${date}</div>${qas}</div>`;
  }).join('');
}
</script>
</body>
</html>
